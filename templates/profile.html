<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | CampusVote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .profile-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: none;
        }
        .profile-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            height: 100px;
            border-radius: 1rem 1rem 0 0;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            background: #eef2ff;
            border: 5px solid white;
            border-radius: 50%;
            margin-top: -50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #4f46e5;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="{{ url_for('student_dashboard') }}">CampusVote</a>
            <div class="ms-auto">
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary btn-sm me-2">Back to Dashboard</a>
                <a href="{{ url_for('logout') }}" class="btn btn-danger btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card profile-card">
                    <div class="profile-header"></div>
                    <div class="card-body text-center pb-5">
                        <div class="avatar-circle mx-auto">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <h3 class="mt-3 fw-bold">{{ user.fullname }}</h3>
                        <p class="text-muted mb-4">{{ user.role|capitalize }} | {{ user.dept }}</p>
                        
                        <div class="row text-start px-4">
                            <div class="col-12 mb-3">
                                <label class="small text-uppercase text-muted fw-bold">Roll Number</label>
                                <div class="fs-5 fw-medium">{{ user.roll_no }}</div>
                            </div>
                            <div class="col-12 mb-3">
                                <label class="small text-uppercase text-muted fw-bold">Email Address</label>
                                <div class="fs-5 fw-medium">{{ user.email }}</div>
                            </div>
                            <div class="col-12">
                                <label class="small text-uppercase text-muted fw-bold">Approval Status</label>
                                <div>
                                    {% if user.is_approved %}
                                    <span class="badge bg-success-subtle text-success border border-success">Verified Voter</span>
                                    {% else %}
                                    <span class="badge bg-warning-subtle text-warning border border-warning">Pending Approval</span>
                                    {% endif %}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
