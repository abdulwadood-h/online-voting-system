<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Your Ballot - {{ election.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-purple: #6c5ce7; }
        .candidate-card {
            border: 2px solid #f1f2f6;
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 15px;
        }
        .candidate-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        /* Style for the radio selection effect */
        .btn-check:checked + .candidate-card {
            border-color: var(--primary-purple);
            background-color: #f8f7ff;
        }
        .cand-img {
            height: 200px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }
        .submit-btn {
            background-color: var(--primary-purple);
            border: none;
            padding: 12px 40px;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">{{ election.title }}</h1>
        <p class="text-muted">Position: <strong>{{ election.position }}</strong></p>
        <div class="badge bg-danger">Ends at: {{ election.end_time }}</div>
    </div>

    <form action="{{ url_for('vote', election_id=election.id) }}" method="POST" id="voteForm">
        <div class="row g-4 justify-content-center">
            {% for candidate in candidates %}
            <div class="col-md-4 col-lg-3">
                <input type="radio" class="btn-check" name="candidate_id" id="cand_{{ candidate.id }}" value="{{ candidate.id }}" required>
                <label class="card candidate-card h-100 shadow-sm" for="cand_{{ candidate.id }}">
                    <img src="{{ url_for('static', filename='uploads/' + candidate.photo) }}" 
                         class="card-img-top cand-img" alt="{{ candidate.name }}">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold mb-1">{{ candidate.name }}</h5>
                        <p class="text-muted small mb-0">Roll No: {{ candidate.roll_no }}</p>
                        <hr>
                        <div class="text-primary fw-bold selection-text">Select Candidate</div>
                    </div>
                </label>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary btn-lg submit-btn shadow" onclick="return confirmVote()">
                Confirm & Cast Vote
            </button>
            <br>
            <a href="{{ url_for('student_dashboard') }}" class="btn btn-link mt-3 text-muted">Cancel and go back</a>
        </div>
    </form>
</div>

<script>
    function confirmVote() {
        const selected = document.querySelector('input[name="candidate_id"]:checked');
        if (!selected) {
            alert("Please select a candidate first!");
            return false;
        }
        return confirm("Are you sure? You cannot change your vote after submission.");
    }
</script>

</body>
</html>
